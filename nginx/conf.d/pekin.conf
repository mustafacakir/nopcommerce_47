server {
    listen 80;
    server_name pekinteknoloji.com www.pekinteknoloji.com;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    location / {
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 80;
    server_name ~^.+\.pekinteknoloji\.com$;

    client_max_body_size 64m;
    proxy_http_version 1.1;
    proxy_buffering off;
    proxy_ignore_client_abort on;
    proxy_read_timeout 300s;
    proxy_connect_timeout 300s;
    proxy_send_timeout 300s;

    location ~* \.(php|env|git|sql|bak|sh|py|rb|pl|asp|aspx|jsp|cgi)$ {
        return 444;
    }

    location ~* ^/(\.env|\.git|wp-admin|wp-login|xmlrpc|phpmyadmin|adminer) {
        return 444;
    }

    location / {
        proxy_pass http://pekin_nopcommerce:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Connection "";
        proxy_max_temp_file_size 0;
    }
}
