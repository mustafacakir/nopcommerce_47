version: '3.8'

services:
  nginx:
    image: nginx:alpine
    container_name: pekin_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - nopcommerce_web

  nopcommerce_web:
    build: .
    container_name: pekin_nopcommerce
    restart: always
    expose:
      - "80"
    depends_on:
      - nopcommerce_db
    dns:
      - 8.8.8.8
      - 8.8.4.4
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
    volumes:
      - ./Presentation/Nop.Web/Plugins:/app/Plugins
      - ./Presentation/Nop.Web/App_Data:/app/App_Data

  nopcommerce_db:
    image: postgres:15-alpine
    container_name: pekin_db
    restart: always
    expose:
      - "5432"
    environment:
      POSTGRES_USER: nopuser
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: nopcommerce_db
    volumes:
      - pekin_db_data:/var/lib/postgresql/data

volumes:
  pekin_db_data:
