version: '3.8'

services:
  nopcommerce_web:
    build: .
    container_name: pekin_nopcommerce
    restart: always
    ports:
      - "127.0.0.1:8086:80"
    depends_on:
      - pgbouncer
      - redis
    dns:
      - 8.8.8.8
      - 8.8.4.4
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
    volumes:
      - ./Presentation/Nop.Web/Plugins/Uploaded:/app/Plugins/Uploaded
      - ./Presentation/Nop.Web/App_Data:/app/App_Data
      - ./Presentation/Nop.Web/wwwroot/images:/app/wwwroot/images

  redis:
    image: redis:7-alpine
    container_name: pekin_redis
    restart: always
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - pekin_redis_data:/data

  pgbouncer:
    image: edoburu/pgbouncer
    container_name: pekin_pgbouncer
    restart: always
    environment:
      DATABASE_URL: "postgres://nopuser:${DB_PASSWORD}@nopcommerce_db/nopcommerce_db"
      POOL_MODE: session
      MAX_CLIENT_CONN: 1000
      DEFAULT_POOL_SIZE: 25
      SERVER_RESET_QUERY: DISCARD ALL
    depends_on:
      - nopcommerce_db

  nopcommerce_db:
    image: postgres:15-alpine
    container_name: pekin_db
    restart: always
    expose:
      - "5432"
    environment:
      POSTGRES_USER: nopuser
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: nopcommerce_db
    volumes:
      - pekin_db_data:/var/lib/postgresql/data

volumes:
  pekin_db_data:
  pekin_redis_data:
