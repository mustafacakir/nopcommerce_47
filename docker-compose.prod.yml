version: '3.8'

services:
  nopcommerce_web:
    build: .
    image: pekin/nopcommerce:latest
    container_name: pekin_nopcommerce
    restart: always
    ports:
      - "127.0.0.1:8086:80"
    depends_on:
      - pgbouncer
      - redis
    dns:
      - 8.8.8.8
      - 8.8.4.4
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_FORWARDEDHEADERS_ENABLED=true
    volumes:
      - ./Presentation/Nop.Web/Plugins/Uploaded:/app/Plugins/Uploaded
      - ./Presentation/Nop.Web/App_Data:/app/App_Data
      - ./Presentation/Nop.Web/wwwroot/images:/app/wwwroot/images

  pekin_web:
    build:
      context: ./PekinTeknolojiWeb
    image: pekin_web_img
    container_name: pekin_web
    restart: always
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      - /etc/letsencrypt:/etc/letsencrypt:ro
    ports:
      - "127.0.0.1:5102:80"

  redis:
    image: redis:7-alpine
    container_name: pekin_redis
    restart: always
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - pekin_redis_data:/data

  pgbouncer:
    image: edoburu/pgbouncer
    container_name: pekin_pgbouncer
    restart: always
    environment:
      DATABASE_URL: "postgres://nopuser:${DB_PASSWORD}@nopcommerce_db/nopcommerce_db"
      POOL_MODE: session
      MAX_CLIENT_CONN: 1000
      DEFAULT_POOL_SIZE: 25
      SERVER_RESET_QUERY: DISCARD ALL
      AUTH_TYPE: scram-sha-256
    depends_on:
      - nopcommerce_db

  nopcommerce_db:
    image: postgres:15-alpine
    container_name: pekin_db
    restart: always
    ports:
      - "127.0.0.1:5432:5432"
    expose:
      - "5432"
    environment:
      POSTGRES_USER: nopuser
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: nopcommerce_db
    volumes:
      - pekin_db_data:/var/lib/postgresql/data

  prometheus:
    image: prom/prometheus:latest
    container_name: pekin_prometheus
    restart: always
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'

  loki:
    image: grafana/loki:latest
    container_name: pekin_loki
    restart: always
    volumes:
      - ./monitoring/loki.yml:/etc/loki/local-config.yaml
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml

  promtail:
    image: grafana/promtail:latest
    container_name: pekin_promtail
    restart: always
    volumes:
      - ./monitoring/promtail.yml:/etc/promtail/config.yml
      - /var/run/docker.sock:/var/run/docker.sock
    command: -config.file=/etc/promtail/config.yml

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: pekin_cadvisor
    restart: always
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro

  node-exporter:
    image: prom/node-exporter:latest
    container_name: pekin_node_exporter
    restart: always
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.ignored-mount-points=^/(sys|proc|dev|host|etc)($$|/)'

  grafana:
    image: grafana/grafana:latest
    container_name: pekin_grafana
    restart: always
    ports:
      - "127.0.0.1:3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://grafana.pekinteknoloji.com

volumes:
  pekin_db_data:
  pekin_redis_data:
  prometheus_data:
  loki_data:
  grafana_data:
