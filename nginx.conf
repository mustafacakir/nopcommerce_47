events {
    worker_connections 1024;
}

http {
    log_format withhost '$host $remote_addr - $remote_user [$time_local] "$request" $status $body_bytes_sent "$http_referer" "$http_user_agent"';

    # Gerçek client IP'sini al
    set_real_ip_from 0.0.0.0/0;
    real_ip_header X-Forwarded-For;

    # Büyük upload'lar için
    client_max_body_size 64m;

    # Proxy timeout
    proxy_read_timeout 300;
    proxy_connect_timeout 300;
    proxy_send_timeout 300;

    # nopCommerce'e gönderilecek header'lar (global)
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # SSL sertifika ayarları (ortak)
    ssl_certificate     /etc/letsencrypt/live/pekinteknoloji.com-0001/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pekinteknoloji.com-0001/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ---------------------------------------------------------------
    # HTTP → HTTPS yönlendirme (tüm pekinteknoloji.com trafiği)
    # ---------------------------------------------------------------
    server {
        listen 80;
        server_name pekinteknoloji.com *.pekinteknoloji.com;

        # Certbot HTTP-01 challenge (custom domain provision için)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ---------------------------------------------------------------
    # HTTPS — pekinteknoloji.com + tüm subdomainler → nopCommerce
    # ---------------------------------------------------------------
    server {
        listen 443 ssl;
        server_name pekinteknoloji.com *.pekinteknoloji.com;

        location /metrics {
            deny all;
        }

        location / {
            proxy_pass http://127.0.0.1:8086;
        }
    }

    # ---------------------------------------------------------------
    # HTTPS — Grafana
    # ---------------------------------------------------------------
    server {
        listen 443 ssl;
        server_name grafana.pekinteknoloji.com;

        location / {
            proxy_pass http://127.0.0.1:3001;
            proxy_http_version 1.1;
            proxy_buffering off;
        }
    }

    # ---------------------------------------------------------------
    # HTTPS — Portainer
    # ---------------------------------------------------------------
    server {
        listen 443 ssl;
        server_name portainer.pekinteknoloji.com;

        location / {
            proxy_pass http://127.0.0.1:9000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }

    include /etc/nginx/sites-enabled/*;
}