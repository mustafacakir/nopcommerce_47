events {
    worker_connections 1024;
}

http {
    # Gerçek client IP'sini al
    set_real_ip_from 0.0.0.0/0;
    real_ip_header X-Forwarded-For;

    # Gzip sıkıştırma
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;
    gzip_min_length 1024;

    # Statik dosyalar için tarayıcı cache'i
    map $sent_http_content_type $cache_header {
        default                    "no-cache";
        ~image/                    "public, max-age=31536000, immutable";
        text/css                   "public, max-age=31536000, immutable";
        application/javascript     "public, max-age=31536000, immutable";
        application/font-woff2     "public, max-age=31536000, immutable";
    }

    # Büyük upload'lar için
    client_max_body_size 64m;

    # Proxy timeout
    proxy_read_timeout 300;
    proxy_connect_timeout 300;
    proxy_send_timeout 300;

    # nopCommerce'e gönderilecek header'lar
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # pekinteknoloji.com ve tüm subdomainler → nopcommerce
    server {
        listen 80;
        server_name pekinteknoloji.com *.pekinteknoloji.com;

        location / {
            proxy_pass http://127.0.0.1:8086;
            add_header Cache-Control $cache_header;
        }
    }
}
