events {
    worker_connections 1024;
}

http {
    # Gerçek client IP'sini al
    set_real_ip_from 0.0.0.0/0;
    real_ip_header X-Forwarded-For;

    # Büyük upload'lar için
    client_max_body_size 64m;

    # Proxy timeout
    proxy_read_timeout 300;
    proxy_connect_timeout 300;
    proxy_send_timeout 300;

    # nopCommerce'e gönderilecek header'lar
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # pekinteknoloji.com ve tüm subdomainler → nopcommerce
    server {
        listen 80;
        server_name pekinteknoloji.com *.pekinteknoloji.com;

        location / {
            proxy_pass http://nopcommerce_web:80;
        }
    }
}
