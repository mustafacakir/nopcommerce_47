events {
    worker_connections 1024;
}

http {
    log_format withhost '$host $remote_addr - $remote_user [$time_local] "$request" $status $body_bytes_sent "$http_referer" "$http_user_agent"';

    # Gerçek client IP'sini al
    set_real_ip_from 0.0.0.0/0;
    real_ip_header X-Forwarded-For;

    # Büyük upload'lar için
    client_max_body_size 64m;

    # Proxy timeout
    proxy_read_timeout 300;
    proxy_connect_timeout 300;
    proxy_send_timeout 300;

    # nopCommerce'e gönderilecek header'lar
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Grafana — *.pekinteknoloji.com wildcard'dan önce eşleşir
    server {
        listen 80;
        server_name grafana.pekinteknoloji.com;
        location / {
            proxy_pass http://127.0.0.1:3001;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
        }
    }

    # Portainer
    server {
        listen 80;
        server_name portainer.pekinteknoloji.com;
        location / {
            proxy_pass http://127.0.0.1:9000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }

    include /etc/nginx/sites-enabled/*;
}
