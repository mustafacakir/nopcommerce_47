events {
    worker_connections 1024;
}

http {
    log_format withhost '$host $remote_addr - $remote_user [$time_local] "$request" $status $body_bytes_sent "$http_referer" "$http_user_agent"';

    # Gerçek client IP'sini al
    set_real_ip_from 0.0.0.0/0;
    real_ip_header X-Forwarded-For;

    # Büyük upload'lar için
    client_max_body_size 64m;

    # Proxy timeout
    proxy_read_timeout 300;
    proxy_connect_timeout 300;
    proxy_send_timeout 300;

    # nopCommerce'e gönderilecek header'lar
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    include /etc/nginx/sites-enabled/*;
}
